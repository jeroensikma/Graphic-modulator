<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graphic Modulator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e0e0e;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
      gap: 24px;
    }

    h1 {
      font-size: 13px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #888;
    }

    #canvas-wrapper {
      border: 1px solid #2a2a2a;
    }

    #controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 720px;
    }

    .control {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #666;
    }

    .control label span {
      color: #aaa;
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 2px;
      background: #2a2a2a;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #e0e0e0;
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border: none;
      border-radius: 50%;
      background: #e0e0e0;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Graphic Modulator</h1>

  <div id="canvas-wrapper"></div>

  <div id="controls"></div>

  <script src="controls.js"></script>
  <script src="sketch.js"></script>
</body>
</html>
